{% set python_min = '3.10' %}
{% set name = "sunkit-magex" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sunkit_magex-{{ version }}.tar.gz
  sha256: 82e1d5259bdbb3c720e51a8d9dfa78cd9dced92b12d601c98c54e3ec8553999b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=62.1
    - setuptools-scm >=6.2
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - astropy-base >=5.2.0
    - numpy >=1.23.0
    - scikit-image >=0.19.0
    - scipy >=1.8.0,!=1.10.0
    - sunpy >=5.1
    - streamtracer >=1.0.0

test:
  imports:
    - sunkit_magex
  commands:
    - pip check
    - pytest --doctest-rst -p no:unraisableexception -p no:threadexception --arraydiff --pyargs sunkit_magex
  requires:
    - pip
    - pytest
    - pytest-doctestplus
    - pytest-arraydiff
    - parfive
    - reproject
    - streamtracer
    - sympy
    - python {{ python_min }}

about:
  home: https://sunpy.org
  summary: Solar Magnetic field Extrapolation
  license: GPL-3.0-only
  license_file: licenses/LICENSE.rst
  doc_url: https://docs.sunpy.org/projects/sunkit-magex/
  dev_url: https://github.com/sunpy/sunkit-magex

extra:
  recipe-maintainers:
    - jgieseler
    - Cadair
    - STBadman
